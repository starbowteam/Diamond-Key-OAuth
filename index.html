<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiamKey · Социальная экосистема</title>
    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Leaflet для GPX -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Тонкий сайдбар (только иконки) -->
        <nav class="sidebar" id="sidebar">
            <button class="sidebar-icon active" data-page="feed" title="Главная"><i class="fas fa-home"></i></button>
            <button class="sidebar-icon" data-page="forum" title="Форум"><i class="fas fa-comments"></i></button>
            <button class="sidebar-icon" data-page="gpx" title="Diamond GPX"><i class="fas fa-map-marker-alt"></i></button>
            <button class="sidebar-icon" data-page="profile" title="Профиль"><i class="fas fa-user"></i></button>
            <button class="sidebar-icon" data-page="settings" title="Настройки"><i class="fas fa-cog"></i></button>
            <a class="sidebar-icon" href="https://diam-ai.ru" target="_blank" title="Diamond AI"><i class="fas fa-gem"></i></a>
        </nav>

        <!-- Контентная область -->
        <main class="main-content" id="mainContent">
            <!-- Страница "Главная" (стена) -->
            <section class="page active" id="page-feed">
                <div class="glass-panel">
                    <h2><i class="fas fa-home"></i> Главная</h2>
                    <div id="wallPosts"></div>
                    <div id="wallForm" style="margin-top: 20px;">
                        <textarea id="wallText" placeholder="Что нового?" rows="2"></textarea>
                        <input type="file" id="wallImage" accept="image/*" style="display:none">
                        <div style="display:flex; gap: 10px; margin-top: 8px;">
                            <button class="btn" onclick="document.getElementById('wallImage').click()"><i class="fas fa-image"></i> Фото</button>
                            <button class="btn" id="postWallBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Страница "Форум" -->
            <section class="page" id="page-forum">
                <div class="glass-panel">
                    <h2><i class="fas fa-comments"></i> Форум</h2>
                    <div id="forumTopics"></div>
                    <div id="forumForm" style="margin-top: 20px;">
                        <input type="text" id="topicTitle" placeholder="Тема">
                        <textarea id="topicContent" placeholder="Сообщение" rows="3"></textarea>
                        <button class="btn" id="createTopicBtn" style="margin-top: 8px;"><i class="fas fa-plus"></i> Создать тему</button>
                    </div>
                </div>
            </section>

            <!-- Страница "Diamond GPX" (встроенный) -->
            <section class="page" id="page-gpx">
                <div class="glass-panel" style="height: calc(100vh - 40px); display: flex; flex-direction: column; padding: 0; overflow: hidden;">
                    <div class="gpx-toolbar" style="padding: 12px 16px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="font-size: 1.2rem; font-weight: 600;">💎 Diamond GPX</span>
                        <button class="btn" onclick="document.getElementById('gpx-file-input').click()">📂 Загрузить GPX</button>
                        <input type="file" id="gpx-file-input" accept=".gpx,.xml" style="display:none" />
                        <button class="btn" onclick="resetGPX()">🗑️ Сброс</button>
                    </div>
                    <div id="gpx-map" style="flex: 1; width: 100%;"></div>
                    <div class="gpx-dashboard" style="padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <div class="key-stats" style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
                            <div class="stat-item"><span class="stat-icon">📏</span><div class="stat-content"><span class="stat-label">Дистанция</span><span class="stat-value" id="distVal">—</span></div></div>
                            <div class="stat-item"><span class="stat-icon">⛰️</span><div class="stat-content"><span class="stat-label">Набор</span><span class="stat-value" id="ascentVal">—</span></div></div>
                            <div class="stat-item"><span class="stat-icon">⏱️</span><div class="stat-content"><span class="stat-label">Время</span><span class="stat-value" id="timeVal">—</span></div></div>
                            <div class="stat-item"><span class="stat-icon">🏁</span><div class="stat-content"><span class="stat-label">Ср. скорость</span><span class="stat-value" id="speedVal">—</span></div></div>
                        </div>
                        <div class="chart-wrap" style="height: 140px; margin-top: 8px;"><canvas id="elevationChart"></canvas></div>
                        <div class="no-elevation" id="noElevationMsg" style="color: #555; text-align: center; font-size: 0.85rem;">Нет данных о высоте</div>
                    </div>
                </div>
            </section>

            <!-- Страница "Профиль" -->
            <section class="page" id="page-profile">
                <div class="glass-panel">
                    <h2><i class="fas fa-user"></i> Профиль</h2>
                    <div id="profileInfo"></div>
                    <div id="profilePosts" style="margin-top: 20px;"></div>
                </div>
            </section>

            <!-- Страница "Настройки" -->
            <section class="page" id="page-settings">
                <div class="glass-panel">
                    <h2><i class="fas fa-cog"></i> Настройки</h2>
                    <div class="input-group"><label>Сменить аватар</label><input type="file" id="settingsAvatar" accept="image/*"></div>
                    <div class="input-group"><label>Новый пароль</label><input type="password" id="settingsPassword" placeholder="Оставьте пустым, чтобы не менять"></div>
                    <button class="btn" id="saveSettingsBtn" style="margin-top: 12px;">Сохранить</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Модалка авторизации -->
    <div class="modal" id="authModal">
        <div class="modal-content glass-panel" id="authModalContent"></div>
    </div>

    <script src="js/diamkey-core.js"></script>
    <script src="js/diamkey-ui.js"></script>
    <script src="js/diamkey-profile.js"></script>
    <script src="js/diamkey-gpx.js"></script>
    <script src="js/diamkey-forum.js"></script>
</body>
</html>
