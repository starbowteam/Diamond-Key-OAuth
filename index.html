<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiamKey · Социальная экосистема</title>
    <link rel="icon" href="assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell" id="appShell">
        <nav class="sidebar" id="sidebar">
            <button class="sidebar-icon active" data-page="home"><i class="fas fa-home"></i></button>
            <button class="sidebar-icon" data-page="forum"><i class="fas fa-comments"></i></button>
            <button class="sidebar-icon" data-page="gpx"><i class="fas fa-map-marker-alt"></i></button>
            <button class="sidebar-icon" data-page="profile"><i class="fas fa-user"></i></button>
            <a class="sidebar-icon" href="https://diamond-ai.ru" target="_blank">
                <img src="assets/diamond-ai.ico" style="width:30px;height:30px;">
            </a>
            <button class="sidebar-icon" id="logoutSidebarBtn"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
        <main class="main-content" id="mainContent">
            <!-- Главная -->
            <section class="page active" id="page-home">
                <!-- без изменений -->
            </section>
            <!-- Форум -->
            <section class="page" id="page-forum">
                <!-- без изменений -->
            </section>
            <!-- GPX -->
            <section class="page" id="page-gpx">
                <div class="glass-panel gpx-container">
                    <div class="gpx-toolbar">
                        <span><i class="fas fa-map-marker-alt"></i> Diamond GPX</span>
                        <button class="btn gpx-upload-btn" onclick="document.getElementById('gpx-file-input').click()"><i class="fas fa-folder-open"></i> Загрузить</button>
                        <input type="file" id="gpx-file-input" accept=".gpx,.xml" style="display:none">
                        <button class="btn gpx-publish-btn" id="saveGpxBtn" style="display:none"><i class="fas fa-cloud-upload-alt"></i> Опубликовать</button>
                    </div>
                    <div id="gpx-map"></div>
                    <div class="gpx-dashboard glass-panel" style="margin:10px; padding:14px;">
                        <div class="stats-grid">
                            <div class="gpx-stat-card"><i class="fas fa-ruler"></i><span class="stat-label">Дистанция</span><span id="distVal" class="stat-value">—</span></div>
                            <div class="gpx-stat-card"><i class="fas fa-mountain"></i><span class="stat-label">Набор</span><span id="ascentVal" class="stat-value">—</span></div>
                            <div class="gpx-stat-card"><i class="fas fa-clock"></i><span class="stat-label">Время</span><span id="timeVal" class="stat-value">—</span></div>
                            <div class="gpx-stat-card"><i class="fas fa-tachometer-alt"></i><span class="stat-label">Ср. скорость</span><span id="speedVal" class="stat-value">—</span></div>
                        </div>
                        <div class="chart-wrap"><canvas id="elevationChart"></canvas></div>
                    </div>
                    <div id="aiReview" class="ai-review glass-panel" style="display:none;">
                        <div class="ai-review-header">
                            <img src="assets/logo-ai.ico" style="width:24px;height:24px;border-radius:50%;">
                            <span>Diamond AI</span>
                        </div>
                        <p id="aiReviewText"></p>
                    </div>
                </div>
            </section>
            <!-- Профиль -->
            <section class="page" id="page-profile">
                <div class="glass-panel profile-top">
                    <div class="profile-header">
                        <div class="avatar-wrapper" id="profileAvatarWrapper">
                            <img id="profileAvatar" src="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
                            <div class="avatar-overlay"><i class="fas fa-pencil-alt"></i></div>
                        </div>
                        <div class="profile-info">
                            <h2 id="profileName"></h2>
                            <p id="profileDescription" class="editable-text">Нажмите, чтобы добавить описание</p>
                            <span class="profile-regdate" id="profileRegDate"></span>
                        </div>
                    </div>
                    <div class="profile-stats" id="profileStats"></div>
                </div>
                <div class="glass-panel profile-gpx">
                    <h3>Мои GPX-прогулки</h3>
                    <div id="profileGpxFiles"></div>
                </div>
            </section>
        </main>
    </div>
    <!-- Модалки без изменений -->
    <script src="js/diamkey-core.js"></script>
    <script src="js/diamkey-ui.js"></script>
    <script src="js/diamkey-wall.js"></script>
    <script src="js/diamkey-gpx.js"></script>
    <script src="js/diamkey-settings.js"></script>
</body>
</html>
